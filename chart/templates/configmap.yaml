apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cnpg-mcp.fullname" . }}-oidc-config
  labels:
    {{- include "cnpg-mcp.labels" . | nindent 4 }}
data:
  oidc.yaml: |
    # Auto-generated from Helm values.
    # See mcp-base docs/cli-integration-contract.md §6 for the authoritative schema.
    auth_type: {{ .Values.oidc.authType | quote }}

    {{- if eq .Values.oidc.authType "keycloak" }}
    # ------------------------------------------------------------------
    # Pattern B — FastMCP KeycloakAuthProvider
    # Keycloak serves DCR natively; FastMCP only verifies JWTs against its JWKS.
    # No client_secret, JWT signing key, or Redis required.
    # ------------------------------------------------------------------
    realm_url: {{ .Values.oidc.issuer | quote }}
    audience: {{ .Values.oidc.audience | quote }}
    required_scopes: {{ .Values.oidc.requiredScopes | default (list "openid") | toJson }}
    {{- else }}
    # ------------------------------------------------------------------
    # Pattern A — FastMCP OAuth proxy (auth0 / generic oidc)
    # FastMCP runs local DCR, issues MCP-signed tokens, persists sessions in Redis.
    # ------------------------------------------------------------------
    issuer: {{ .Values.oidc.issuer | quote }}
    audience: {{ .Values.oidc.audience | quote }}
    client_id: {{ .Values.oidc.clientId | quote }}

    client_secret_file: '/etc/mcp/secrets/oidc/{{ .Values.oidc.clientSecretKey | default "server-client-secret" }}'
    jwt_signing_key_file: "/etc/mcp/secrets/jwt-signing-key"
    storage_encryption_key_file: "/etc/mcp/secrets/storage-encryption-key"
    {{- end }}

    {{- if .Values.oidc.publicUrl }}
    public_url: {{ .Values.oidc.publicUrl | quote }}
    {{- else if and .Values.ingress.enabled .Values.ingress.host }}
    public_url: {{ if .Values.ingress.tls.enabled }}"https://{{ .Values.ingress.host }}"{{ else }}"http://{{ .Values.ingress.host }}"{{ end }}
    {{- else }}
    # WARNING: No public_url configured — OAuth callbacks will fail.
    {{- end }}

    {{- if .Values.oidc.jwksUri }}
    jwks_uri: {{ .Values.oidc.jwksUri | quote }}
    {{- end }}

    {{- if and (ne .Values.oidc.authType "keycloak") .Values.oidc.scope }}
    scope: {{ .Values.oidc.scope | quote }}
    {{- end }}

    {{- if and (ne .Values.oidc.authType "keycloak") .Values.redis.enabled }}
    # Redis — Pattern A session persistence.
    redis:
      host: "{{ .Release.Name }}-redis"
      port: {{ .Values.redis.service.port | default 6379 }}
      db: 0
    {{- end }}
