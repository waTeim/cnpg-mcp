apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cnpg-mcp.fullname" . }}
  labels:
    {{- include "cnpg-mcp.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "cnpg-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cnpg-mcp.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cnpg-mcp.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: '{{ .Values.image.repository }}:{{ .Values.image.tag | default (printf "v%s" .Chart.AppVersion) }}'
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            {{- if .Values.prompts.enabled }}
            - name: PROMPTS_PATH
              value: "/etc/mcp/prompts/prompts.yaml"
            {{- end }}

          # Mount configuration volumes
          volumeMounts:
            # Always mount ConfigMap for OIDC config
            - name: oidc-config
              mountPath: /etc/mcp/oidc
              readOnly: true
            {{- if ne .Values.oidc.authType "keycloak" }}
            # Pattern A — client credentials secret
            - name: oidc-credentials
              mountPath: /etc/mcp/secrets/oidc
              readOnly: true
            {{- end }}
            {{- if and (ne .Values.oidc.authType "keycloak") .Values.jwt.enabled }}
            # Pattern A — JWT signing key + storage encryption key
            - name: jwt-signing-key
              mountPath: /etc/mcp/secrets
              readOnly: true
            {{- end }}
            {{- if .Values.prompts.enabled }}
            # Mount prompts ConfigMap (hot-reloadable)
            - name: prompts
              mountPath: /etc/mcp/prompts
              readOnly: true
            {{- end }}

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

        {{- if .Values.testSidecar.enabled }}
        # Test sidecar container — runs the test server in --no-auth mode.
        # Authentication is disabled; identity (sub/iss) is supplied to the
        # NoAuthMiddleware via --identity so user_hash + mcp_context still work.
        # The Service exposes this port as ClusterIP only and the Ingress does
        # NOT route to it, so it is reachable only inside the cluster or via
        # `kubectl port-forward`.
        #
        # IMAGE DERIVATION: the sidecar must run the *test* image (which
        # contains the *_test_server.py entrypoint), not the main image.
        # If testSidecar.image.repository is empty (the default), derive the
        # test image from .Values.image.repository by replacing the trailing
        # "-server" suffix with "-test-server". Examples:
        #   wateim/myproj-server  →  wateim/myproj-test-server
        # Set testSidecar.image.repository explicitly to override.
        {{- $testImageRepo := .Values.testSidecar.image.repository | default (regexReplaceAll "-server$" .Values.image.repository "-test-server") }}
        {{- $testImageTag := .Values.testSidecar.image.tag | default (.Values.image.tag | default (printf "v%s" .Chart.AppVersion)) }}
        {{- $testImagePullPolicy := .Values.testSidecar.image.pullPolicy | default .Values.image.pullPolicy }}
        - name: {{ .Chart.Name }}-test
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: '{{ $testImageRepo }}:{{ $testImageTag }}'
          imagePullPolicy: {{ $testImagePullPolicy }}
          command: ["python", "cnpg_mcp_test_server.py"]
          args:
            - "--no-auth"
            - "--identity"
            - {{ .Values.testSidecar.identity | default "test-user" | quote }}
            - "--host"
            - "0.0.0.0"
            - "--port"
            - {{ .Values.service.testPort | quote }}
          ports:
            - name: http-test
              containerPort: {{ .Values.service.testPort }}
              protocol: TCP

          env:
            - name: PYTHONUNBUFFERED
              value: "1"

          # No OIDC config or credentials — the test sidecar runs in --no-auth.

          livenessProbe:
            httpGet:
              path: /healthz
              port: http-test
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http-test
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            {{- toYaml .Values.testSidecar.resources | nindent 12 }}
        {{- end }}

      # Define volumes for OIDC configuration
      volumes:
        # Always use ConfigMap for OIDC config (non-sensitive)
        - name: oidc-config
          configMap:
            name: {{ include "cnpg-mcp.fullname" . }}-oidc-config
            items:
              - key: oidc.yaml
                path: oidc.yaml
        {{- if ne .Values.oidc.authType "keycloak" }}
        # Pattern A — client credentials secret
        - name: oidc-credentials
          secret:
            secretName: {{ .Values.oidc.credentialsSecretName | default (printf "%s-oidc-credentials" .Release.Name) }}
            items:
              - key: {{ .Values.oidc.clientSecretKey | default "server-client-secret" }}
                path: {{ .Values.oidc.clientSecretKey | default "server-client-secret" }}
        {{- end }}
        {{- if and (ne .Values.oidc.authType "keycloak") .Values.jwt.enabled }}
        # Pattern A — JWT signing key + storage encryption key
        - name: jwt-signing-key
          secret:
            secretName: {{ .Values.jwt.secretName | default (printf "%s-jwt-signing-key" .Release.Name) }}
            items:
              - key: jwt-signing-key
                path: jwt-signing-key
              - key: storage-encryption-key
                path: storage-encryption-key
        {{- end }}
        {{- if .Values.prompts.enabled }}
        # Mount prompts ConfigMap
        - name: prompts
          configMap:
            name: {{ include "cnpg-mcp.fullname" . }}-prompts
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
